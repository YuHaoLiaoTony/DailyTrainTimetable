name: Update train data

on:
  schedule:
    # 05:00 Asia/Taipei is 21:00 UTC on the previous day.
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: Number of days to generate
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "7"
          - "14"
          - "31"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache output data
        uses: actions/cache@v4
        with:
          path: output/data
          key: train-data-${{ github.run_id }}
          restore-keys: |
            train-data-

      - name: Run tests
        run: dotnet test --configuration Release

      - name: Generate train timetable JSON
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: dotnet run --configuration Release --project DailyTrainTimetable.csproj -- --days ${{ inputs.days || '1' }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
